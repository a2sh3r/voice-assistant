name: Build Binaries

on:
  push:
    tags:
      - "v*"          # trigger on version tags: git tag v1.0.0 && git push --tags
  workflow_dispatch:  # or manually from GitHub UI

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: assistant-windows
            binary: dist/assistant/assistant.exe
          - os: ubuntu-latest
            artifact: assistant-linux
            binary: dist/assistant/assistant
          - os: macos-latest
            artifact: assistant-macos
            binary: dist/assistant/assistant

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Install Linux audio deps
        if: runner.os == 'Linux'
        run: sudo apt-get install -y libportaudio2 libsndfile1

      - name: Install macOS audio deps
        if: runner.os == 'macOS'
        run: brew install portaudio libsndfile

      - name: Build with PyInstaller
        run: pyinstaller assistant.spec --noconfirm

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/assistant/
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Zip each platform
        run: |
          zip -r assistant-windows.zip assistant-windows/
          zip -r assistant-linux.zip   assistant-linux/
          zip -r assistant-macos.zip   assistant-macos/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            assistant-windows.zip
            assistant-linux.zip
            assistant-macos.zip
